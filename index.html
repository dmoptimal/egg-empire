<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#63a344" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <title>Egg Empire</title>
    <!-- PLAN.md Phase 1: the game is fully self-contained in one canvas.
         index.html is only the canvas mount (the ?dev=1 admin panel, a dev
         tool, is the sole DOM exception and mounts itself into #game). -->
    <style>
      html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#20301a;font-family:system-ui,sans-serif;
        -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;overscroll-behavior:none}
      #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
      #game{flex:1;position:relative;touch-action:none}
      #game canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="game"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
