<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Egg Empire</title>
    <!-- Shell CSS ported verbatim from prototype/egg-empire.html. The DOM HUD
         and bottom bar stay until PLAN.md Phase 1 moves everything to canvas.
         Overlays over the canvas need explicit z-index (CLAUDE.md gotcha). -->
    <style>
      html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#4a7c2f;font-family:system-ui,sans-serif;
        -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;overscroll-behavior:none}
      #wrap{position:fixed;inset:0;display:flex;flex-direction:column}
      #game{flex:1;position:relative;touch-action:none}
      #game canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0}
      #stats{position:absolute;top:0;left:0;right:0;display:flex;justify-content:center;gap:10px;
        padding:calc(6px + env(safe-area-inset-top)) 8px 6px;pointer-events:none;z-index:2}
      .chip{background:rgba(0,0,0,.45);border-radius:20px;padding:5px 14px;color:#fff;font-weight:800;font-size:16px}
      #money{color:#ffd94a}#feathers{color:#8fe3d0}
      #mute{pointer-events:auto;padding:5px 10px}
      #bar{padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:#20301a;display:flex;gap:8px}
      #shop{flex:1;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
      #shop button{flex:0 0 auto;min-width:100px}
      #togglePanel{flex:0 0 32%;min-width:112px}
      #bar button{min-height:54px;border:0;border-radius:12px;font-size:14px;font-weight:800;color:#fff;
        background:#2f6fdb;box-shadow:0 3px 0 rgba(0,0,0,.35);padding:4px}
      #bar button:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.35)}
      #bar button:disabled{background:#4a4a4a;color:#999}
      #bar button small{display:block;font-weight:600;font-size:11px;opacity:.9;margin-top:2px}
      #hint{position:absolute;left:0;right:0;top:42%;text-align:center;color:#fff;font-weight:800;font-size:16px;
        text-shadow:0 2px 4px rgba(0,0,0,.6);pointer-events:none;transition:opacity .6s;z-index:2;opacity:0}
      #toast{position:absolute;top:calc(48px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
        background:rgba(0,0,0,.65);border-radius:14px;padding:8px 16px;color:#ffd94a;font-weight:800;font-size:14px;
        pointer-events:none;z-index:2;opacity:0;transition:opacity .5s;white-space:nowrap}
    </style>
  </head>
  <body>
    <div id="wrap">
      <div id="game">
        <div id="stats">
          <span class="chip" id="money">$0</span>
          <span class="chip" id="feathers">0 🪶</span>
          <span class="chip" id="mute">🔊</span>
        </div>
        <div id="hint">Tap or swipe across the eggs to collect them!</div>
        <div id="toast"></div>
      </div>
      <div id="bar">
        <div id="shop"></div>
        <button id="togglePanel">Skill tree 🪶</button>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
